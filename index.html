<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>Design AGENCY</title>
</head>

<body>

    <header>
        <div class="container">
            <div class="design">
                <h3>Design <span>AGENCY</span></h3>
            </div>

            <nav>
                <a class="nav-link" href="#">Services <img class="icon" src="./img/Vector.png" alt="vector"></a>
                <a class="nav-link" href="#">About Us</a>
                <a class="nav-link" href="#">Contact Us</a>
                <button class="button-login"> Login</button>
                <button class="button-register">Register</button>

            </nav>

        </div>

    </header>
    <main>
        <div class="container">
            <section>
                <h1>Increase Your Customers Loyalty and Satisfaction</h1>

                <p>We help businesses like yours earn more customers, standout from competitors, make more money</p>

                <button class="button-started">Get Started</button>
            </section>
            <img class="hero-image" src="./img/desing-foto.png"
                alt="Mulher com um notebook na mão, olhando para a tela e sorrindo." />
        </div>

    </main>

    <footer>
        <div class="container">
            <a href="https://www.google.com/"><img src="./img/logos_google.png" alt="Google"></a>
            <a href="https://trello.com/"><img src="./img/Trello-logo-blue 1.png" alt="Trello"></a>
            <a href="https://monday.com/"><img src="./img/logos_monday.png" alt="Monday.com"></a>
            <a href="https://www.notion.com/"><img src="./img/Notion.png" alt="Notion"></a>
            <a href="https://slack.com/"><img src="./img/Slack.png" alt="Slack"></a>
        </div>

    </footer>

</body>

</html>
